x-app-env: &app-env
  DATABASE_PATH: "${DATABASE_PATH:-/data/liteskill.db}"
  # SECRET_KEY_BASE is auto-generated on first boot if not provided.
  # To persist across container restarts, mount a volume and set LITESKILL_SECRETS_FILE.
  SECRET_KEY_BASE: "${SECRET_KEY_BASE:-}"
  # Encryption is off by default. To enable, set both:
  #   LITESKILL_ENCRYPTION=true
  #   ENCRYPTION_KEY=<your-key>  (generate with: openssl rand -base64 32)

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - sqlitedata:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      <<: *app-env
      PHX_HOST: "${PHX_HOST:-localhost}"
      FORCE_SSL: "false"
      # OIDC_ISSUER: ""
      # OIDC_CLIENT_ID: ""
      # OIDC_CLIENT_SECRET: ""

  migrate:
    build: .
    command: ["bin/migrate"]
    volumes:
      - sqlitedata:/data
    environment:
      <<: *app-env
    profiles:
      - tools

volumes:
  sqlitedata:
