apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "liteskill.fullname" . }}
  labels:
    {{- include "liteskill.labels" . | nindent 4 }}
data:
  PHX_HOST: {{ .Values.config.phxHost | quote }}
  PORT: {{ .Values.config.port | quote }}
  POOL_SIZE: {{ .Values.config.poolSize | quote }}
  ECTO_IPV6: {{ .Values.config.ectoIpv6 | quote }}
  {{- if .Values.config.dnsClusterQuery }}
  DNS_CLUSTER_QUERY: {{ .Values.config.dnsClusterQuery | quote }}
  {{- end }}
  {{- if .Values.config.singleUserMode }}
  SINGLE_USER_MODE: "true"
  {{- end }}
  {{- if .Values.config.sessionMaxAgeSeconds }}
  SESSION_MAX_AGE_SECONDS: {{ .Values.config.sessionMaxAgeSeconds | quote }}
  {{- end }}
  {{- if .Values.config.sessionIdleTimeoutSeconds }}
  SESSION_IDLE_TIMEOUT_SECONDS: {{ .Values.config.sessionIdleTimeoutSeconds | quote }}
  {{- end }}
  {{- if .Values.oidc.enabled }}
  OIDC_ISSUER: {{ .Values.oidc.issuer | quote }}
  OIDC_CLIENT_ID: {{ .Values.oidc.clientId | quote }}
  {{- end }}
  {{- if .Values.saml.enabled }}
  SAML_IDP_METADATA_FILE: {{ .Values.saml.idpMetadataFile | quote }}
  SAML_SP_ID: {{ .Values.saml.spId | quote }}
  SAML_SP_ENTITY_ID: {{ .Values.saml.spEntityId | quote }}
  {{- if .Values.saml.spCertfile }}
  SAML_SP_CERTFILE: {{ .Values.saml.spCertfile | quote }}
  {{- end }}
  {{- if .Values.saml.spKeyfile }}
  SAML_SP_KEYFILE: {{ .Values.saml.spKeyfile | quote }}
  {{- end }}
  SAML_IDP_ID: {{ .Values.saml.idpId | quote }}
  {{- if .Values.saml.baseUrl }}
  SAML_BASE_URL: {{ .Values.saml.baseUrl | quote }}
  {{- end }}
  {{- end }}
